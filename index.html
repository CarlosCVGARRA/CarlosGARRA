<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Codificador Carlos GARRA</title>

<style>
:root{
  --bg:url(https://wallpapers.com/images/hd/razer-rainbow-chroma-logo-kxnuuska3ajdi4tp.jpg);
  --green:#0f0;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg) no-repeat center center fixed;
  background-size:cover;
  font-family:Arial;
}

/* CELULAR */
#phone{
  width:100%;
  max-width:420px;
  height:95vh;
  background:rgba(0,0,0,0.75);
  display:flex;
  flex-direction:column;
  border-radius:15px;
  overflow:hidden;
  color:white;
  box-shadow:0 0 20px rgba(0,255,0,0.3);
}

/* HEADER */
header{
  text-align:center;
  padding:10px;
  background:rgba(0,0,0,0.6);
  font-weight:bold;
}

/* LOGIN */
#login{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:15px;
  padding:20px;
}

#login img{
  width:120px;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

input{
  padding:10px;
  font-size:18px;
  text-align:center;
  width:80%;
  max-width:250px;
  text-transform:uppercase;
}

button{
  padding:10px 20px;
  background:var(--green);
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* APP */
#app{
  display:none;
  flex:1;
  padding:10px;
  flex-direction:column;
  gap:10px;
}

textarea{
  width:100%;
  height:120px;
  background:#111;
  color:var(--green);
  border:none;
  padding:10px;
  font-size:16px;
  text-transform:uppercase;
  resize:none;
}

/* BOTÕES ORGANIZADOS */
.btn-group{
  display:flex;
  flex-direction:column;
  gap:5px;
  margin-bottom:10px;
}

.btn-group button{
  width:100%;
}

/* LIMPAR */
.btn-limpar{
  margin-top:10px;
  width:100%;
}

/* FOOTER */
footer{
  text-align:center;
  padding:8px;
  font-size:12px;
  background:rgba(0,0,0,0.6);
  line-height:1.4;
}

/* RESPONSIVO */
@media(max-width:600px){
  #phone{
    height:100vh;
    border-radius:0;
  }
}
</style>
</head>

<body>

<div id="phone">

<header>Codificador Carlos GARRA</header>

<!-- LOGIN -->
<div id="login">

  <img src="https://i.pinimg.com/564x/0d/2a/57/0d2a57609f18177d72afe09d83eea568.jpg">

  <input id="senha" type="password" placeholder="Senha">

  <button onclick="entrar()">Entrar</button>

  <img src="https://i.pinimg.com/236x/7a/e3/25/7ae325b74152b106ad8c082295c38799.jpg">

</div>

<!-- APP -->
<div id="app">

<textarea id="txt" placeholder="Texto normal" oninput="cod()"></textarea>

<div class="btn-group">
  <button onclick="copiar('txt')">Copiar Texto Normal</button>
</div>

<textarea id="cod" placeholder="Texto codificado" oninput="decod()"></textarea>

<div class="btn-group">
  <button onclick="copiar('cod')">Copiar Texto Codificado</button>
</div>

<button class="btn-limpar" onclick="limpar()">Limpar Tudo</button>

</div>

<footer>
<div>Criado por Carlos GARRA</div>
<div id="data"></div>
</footer>

</div>

<script>

const senha="201066";

/* DATA */
document.getElementById("data").innerText =
new Date().toLocaleDateString("pt-BR");

/* ENTER */
document.getElementById("senha").addEventListener("keydown",e=>{
  if(e.key==="Enter") entrar();
});

/* LOGIN */
function entrar(){
  let s=document.getElementById("senha").value;
  if(s===senha){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
  }
}

/* CODIFICAÇÃO FORTE */
const t={
A:"3P",B:"7Q",C:"1M",D:"9L",E:"4X",F:"6Z",G:"2Y",H:"8V",I:"5N",J:"1W",
K:"3O",L:"7R",M:"2S",N:"9T",O:"4U",P:"6A",Q:"8B",R:"5C",S:"1D",T:"3E",
U:"7F",V:"2G",W:"9H",X:"4I",Y:"6J",Z:"8K",
0:"0Z",1:"1Y",2:"2X",3:"3W",4:"4V",5:"5U",6:"6T",7:"7S",8:"8R",9:"9Q"
};

const r=Object.fromEntries(Object.entries(t).map(([k,v])=>[v,k]));
const keys=Object.keys(r).sort((a,b)=>b.length-a.length);
const reg=new RegExp(keys.join("|"),"g");

function cod(){
  let txt=document.getElementById("txt").value.toUpperCase();
  let out="";
  for(let c of txt) out+=t[c]||c;
  document.getElementById("cod").value=out.toUpperCase();
}

function decod(){
  let txt=document.getElementById("cod").value.toUpperCase();
  document.getElementById("txt").value=txt.replace(reg,m=>r[m]||m);
}

/* COPIAR */
function copiar(id){
  navigator.clipboard.writeText(document.getElementById(id).value);
}

/* LIMPAR */
function limpar(){
  document.getElementById("txt").value="";
  document.getElementById("cod").value="";
}

</script>

</body>
</html>
